server {
    listen 80;
    server_name brands.ktb-apps.online;

    # Certbot webroot (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name brands.ktb-apps.online;

    ssl_certificate /etc/letsencrypt/live/brands.ktb-apps.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brands.ktb-apps.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
