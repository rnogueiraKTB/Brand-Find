{% load brand_extras %}
{% if results %}
    {% for brand in results %}
        <button type="button" class="dropdown-item" data-brand="{{ brand.brand }}">
            {% if brand.logo_source %}
                <img src="{{ brand.logo_source }}" alt="{{ brand.brand }} logo" class="dropdown-item-logo">
            {% else %}
                <span class="dropdown-item-placeholder">{{ brand.brand|brand_initials }}</span>
            {% endif %}
            <span>{{ brand.brand }}</span>
        </button>
    {% endfor %}
{% elif query %}
    <p class="dropdown-empty">No brands found for this search.</p>
{% endif %}
