{% load brand_extras %}
{% if brand %}
    <section class="box search-result-card">
        <h2 class="box-title">Search Result</h2>
        <div class="search-result-content">
            <div class="search-result-fields">
                {% include "brands/partials/brand_detail.html" %}
            </div>
            <div class="result-logo-frame">
                {% if brand.logo %}
                    <img
                        src="{{ brand.logo.url }}"
                        alt="{{ brand.brand }} logo"
                        class="result-logo"
                    >
                {% else %}
                    <div class="result-logo-placeholder">{{ brand.brand|brand_initials }}</div>
                {% endif %}
            </div>
        </div>
    </section>
{% endif %}
