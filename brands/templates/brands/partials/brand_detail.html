{% load brand_extras %}
<div class="detail-list">
    <div class="detail-row">
        <span class="detail-label">Brand</span>
        <span class="detail-value detail-value-brand">{{ brand.brand }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Inquire to</span>
        <span class="detail-value">{{ brand.inquire_to|highlight_inquire_to }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Notes</span>
        <span class="detail-value">{{ brand.notes|default:"-" }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Info received from</span>
        <span class="detail-value">{{ brand.info_received_from|default:"-" }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Last changed on</span>
        <span class="detail-value">{{ brand.last_changed_on|date:"Y-m-d" }}</span>
    </div>
</div>
